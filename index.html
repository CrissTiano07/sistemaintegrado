<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT — Painel Semafórico v14 (otimizado)</title>
    <link rel="icon" href="data:,">
    
    <!-- CSS: carregamento não bloqueante com preload + fallback -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========== RESET E VARIÁVEIS ========== */
        :root {
            --color-primary:        #3B82F6;
            --color-primary-hover:  #60A5FA;
            --color-bg:      #0F172A;
            --color-surface: #1E293B;
            --color-border:  #334155;
            --color-text-primary:   #F1F5F9;
            --color-text-secondary: #CBD5E1;
            --color-text-tertiary:  #94A3B8;
            --color-success: #22C55E;
            --color-warning: #EAB308;
            --color-danger:  #EF4444;
            --color-info:    #0EA5E9;
            --color-vl:      #f0883e;
            --color-amc:     #58a6ff;
            --font-family-sans: 'Inter', sans-serif;
            --font-family-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            --radius-sm: 6px;
            --radius-md: 12px;
            --space-1: 8px;
            --space-2: 16px;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family-sans);
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            padding: 16px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* ========== SCROLLBAR ========== */
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb { background-color: var(--color-border); border-radius: 10px; }

        /* ========== LOGIN BAR ========== */
        #nit-login-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 12px 24px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #nit-login-bar.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        #nit-login-bar .logo { font-size: 18px; font-weight: 700; color: var(--color-primary); letter-spacing: -0.5px; flex-shrink: 0; }
        #nit-login-bar .sep { color: var(--color-border); }
        #nit-login-bar input, #nit-login-bar select {
            background: var(--color-bg); border: 1px solid var(--color-border);
            border-radius: var(--radius-sm); color: var(--color-text-primary);
            font-size: 13px; padding: 7px 12px; height: 34px;
        }
        #nit-login-bar input:focus, #nit-login-bar select:focus { outline: none; border-color: var(--color-primary); }
        #nit-login-bar input { width: 200px; }
        #nit-login-bar select { width: 130px; cursor: pointer; }
        #btn-login-entrar {
            height: 34px; padding: 0 20px;
            background: var(--color-primary); color: #fff; border: none;
            border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background .2s;
        }
        #btn-login-entrar:hover:not(:disabled) { background: var(--color-primary-hover); }
        #btn-login-entrar:disabled { opacity: .4; cursor: not-allowed; }
        #nit-login-bar label { font-size: 11px; color: var(--color-text-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

        /* ========== LAYOUT PRINCIPAL ========== */
        .main-container { display: flex; flex-direction: column; height: calc(100vh - 32px); margin-top: 60px; }
        
        .tab-navigation { display: flex; border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-2); flex-shrink: 0; }
        .tab-button { padding: 10px 20px; cursor: pointer; background: none; border: none; color: var(--color-text-primary); font-weight: 600; font-size: 14px; border-bottom: 2px solid var(--color-primary); }
        .tab-button i { margin-right: var(--space-1); }
        .tab-controls { margin-left: auto; display: flex; align-items: center; gap: 8px; padding-right: 10px; }

        .tab-content { display: block; flex-grow: 1; min-height: 0; }
        .grid-container { display: grid; gap: var(--space-2); height: 100%; min-height: 0; }
        .grid-column { display: flex; flex-direction: column; gap: var(--space-2); min-height: 0; }

        .painel { display: flex; flex-direction: column; background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); min-height: 0; }
        .painel-header { padding: 12px var(--space-2); border-bottom: 1px solid var(--color-border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
        .painel-header h3 { margin: 0; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .painel-body { padding: var(--space-2); flex-grow: 1; display: flex; flex-direction: column; gap: var(--space-2); min-height: 0; overflow-y: auto; }

        .form-group { margin-bottom: var(--space-2); }
        .form-group label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 14px; color: var(--color-text-secondary); }
        .form-group textarea, .form-group select {
            width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--color-border);
            padding: 12px; background-color: var(--color-bg);
            font-family: var(--font-family-sans); font-size: 14px;
            color: var(--color-text-secondary);
        }
        .mono-font { font-family: var(--font-family-mono); font-size: 12px; line-height: 1.5; }

        .btn { padding: 8px 16px; border: 1px solid transparent; border-radius: var(--radius-sm); font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-primario { background-color: var(--color-primary); color: white; }
        .btn-primario:hover { background-color: var(--color-primary-hover); }
        .btn-secundario { background-color: var(--color-surface); color: var(--color-text-primary); border-color: var(--color-border); }
        .btn-icon { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 16px; padding: 4px; border-radius: 50%; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-icon:hover { color: var(--color-text-primary); background-color: var(--color-border); }

        /* ========== KANBAN ========== */
        #tab-semaforo .grid-container { grid-template-columns: 360px 1fr; }
        .painel-operacional-wrapper { position: relative; overflow: hidden; height: 100%; flex-grow: 1; min-height: 0; }
        #gaveta-arquivados { position: absolute; top: 0; right: 0; width: 300px; height: 100%; background-color: var(--color-surface); border-left: 1px solid var(--color-border); z-index: 10; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        #gaveta-arquivados.open { transform: translateX(0); }
        #kanban-wrapper.gaveta-open { margin-right: 300px; }
        .kanban-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-2); height: 100%; }
        .kanban-column { background-color: var(--color-bg); border-radius: var(--radius-md); display: flex; flex-direction: column; height: 100%; overflow: hidden; border: 1px solid var(--color-border); }
        .kanban-column-header { padding: 10px 12px; font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--color-border); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
        .kanban-column-header .header-text { flex-grow: 1; }
        .card-count { font-size: 11px; background-color: var(--color-border); padding: 2px 8px; border-radius: 8px; }
        .kanban-cards-container { padding: var(--space-1); flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
        .kanban-card { background-color: var(--color-surface); padding: 12px; border-radius: 8px; cursor: grab; border: 1px solid var(--color-border); transition: transform 0.15s ease; }
        .kanban-card:hover { transform: translateY(-2px); border-color: var(--color-primary); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-header strong { font-size: 14px; }
        .card-status-tag { background: color-mix(in srgb, var(--color-warning) 15%, transparent); color: var(--color-warning); padding: 2px 8px; border-radius: 12px; font-size: 10px; }
        .card-body { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; line-height: 1.4; }
        .card-footer { display: flex; justify-content: flex-end; gap: 4px; border-top: 1px solid var(--color-border); padding-top: 6px; margin-top: 6px; }
        .btn-card-action { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 14px; padding: 4px; }
        .btn-card-action.complete { color: var(--color-success); background: color-mix(in srgb, var(--color-success) 12%, transparent); border-radius: 20px; padding: 4px 8px; }
        .btn-card-action.complete:hover { background: var(--color-success); color: #fff; }
        .reincident-tag { background: var(--color-info); color: white; font-size: 9px; padding: 2px 6px; border-radius: 8px; margin-left: 6px; }

        .balanco-compacto { display: flex; justify-content: space-around; text-align: center; padding: 8px 0; }
        .balanco-item span { font-size: 10px; text-transform: uppercase; color: var(--color-text-tertiary); }
        .balanco-item strong { font-size: 18px; display: block; }

        #filtro-data-input { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: var(--color-text-primary); font-size: 12px; padding: 4px 8px; height: 30px; }
        #nit-operador-badge { font-size: 11px; color: var(--color-text-secondary); background: color-mix(in srgb, var(--color-primary) 10%, transparent); border-radius: 10px; padding: 3px 8px; display: none; }

        /* ========== MODAIS ========== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.75); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal-overlay.visible { opacity: 1; visibility: visible; }
        .modal-container { background: var(--color-surface); border-radius: var(--radius-md); width: 90%; max-width: 500px; border: 1px solid var(--color-border); }
        .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--color-border); font-size: 16px; font-weight: 600; }
        .modal-body { padding: 24px; max-height: 70vh; overflow-y: auto; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--color-border); display: flex; justify-content: flex-end; gap: 8px; }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .toast { background: var(--color-success); color: white; padding: 12px 20px; border-radius: 8px; box-shadow: var(--shadow-md); transform: translateX(120%); transition: transform 0.3s; margin-bottom: 10px; font-size: 13px; }
        .toast.show { transform: translateX(0); }
        .toast.error { background: var(--color-danger); }
        .toast.warning { background: var(--color-warning); color: #1a1a1a; }
    </style>
</head>
<body>

<!-- LOGIN BAR -->
<div id="nit-login-bar">
    <div class="logo">NIT</div>
    <span class="sep">|</span>
    <label for="login-nome">Operador</label>
    <input id="login-nome" type="text" placeholder="Seu nome" autocomplete="off" maxlength="40">
    <label for="login-turno">Turno</label>
    <select id="login-turno">
        <option value="">— turno —</option>
        <option value="MANHÃ">Manhã</option>
        <option value="TARDE">Tarde</option>
        <option value="NOITE">Noite</option>
    </select>
    <button id="btn-login-entrar" disabled>Entrar</button>
</div>

<div class="main-container">
    <div class="tab-navigation">
        <button class="tab-button active" data-tab="tab-semaforo"><i class="fas fa-traffic-light"></i> Semafórico</button>
        <div class="tab-controls">
            <input type="date" id="filtro-data-input" title="Filtrar por data">
            <span id="nit-operador-badge"></span>
            <span id="nit-firebase-status" class="status-indicator">Conectando…</span>
            <button id="btn-ver-historico" class="btn-icon" title="Histórico"><i class="fas fa-history"></i></button>

        </div>
    </div>

    <div id="tab-semaforo" class="tab-content">
        <div class="grid-container" style="grid-template-columns: 360px 1fr;">
            <div class="grid-column">
                <div class="painel">
                    <div class="painel-header"><h3><i class="fas fa-paste"></i> 1. Entrada de Dados</h3></div>
                    <div class="painel-body">
                        <textarea id="relatorio-bruto-input" class="mono-font" rows="10" placeholder="Cole aqui o relatório bruto..."></textarea>
                        <button id="btn-processar" class="btn btn-primario" style="width:100%"><i class="fas fa-cogs"></i> Processar</button>
                    </div>
                </div>
                <div class="painel flex-grow">
                    <div class="painel-header"><h3><i class="fas fa-clipboard-check"></i> 2. Saída</h3></div>
                    <div class="painel-body">
                        <div class="balanco-compacto">
                            <div class="balanco-item"><span>Ocorrências</span><strong id="display-total">0</strong></div>
                            <div class="balanco-item"><span>Normalizados</span><strong id="display-normalizados">0</strong></div>
                            <div class="balanco-item"><span>Pendentes</span><strong id="display-pendentes">0</strong></div>
                        </div>
                        <textarea id="relatorio-final-preview" class="mono-font" rows="6" readonly placeholder="Preview do relatório..."></textarea>
                        <div class="form-check">
                            <input type="checkbox" id="check-incluir-normalizados">
                            <label for="check-incluir-normalizados">Incluir Normalizados</label>
                        </div>
                        <button id="btn-visualizar-relatorio" class="btn btn-primario" style="width:100%"><i class="fas fa-eye"></i> Visualizar Relatório</button>
                    </div>
                </div>
            </div>
            <div class="grid-column">
                <div class="painel-operacional-wrapper">
                    <div id="kanban-wrapper">
                        <div class="kanban-board">
                            <div class="kanban-column" id="coluna-espera">
                                <div class="kanban-column-header"><span class="header-text" style="color:var(--color-danger)"><i class="fas fa-clock"></i> Aguardando</span><span class="card-count" id="count-espera">0</span></div>
                                <div class="kanban-cards-container" data-coluna-id="coluna-espera"></div>
                            </div>
                            <div class="kanban-column" id="coluna-sem-necessidade">
                                <div class="kanban-column-header"><span class="header-text">Sem Necessidade</span><span class="card-count" id="count-sem-necessidade">0</span></div>
                                <div class="kanban-cards-container" data-coluna-id="coluna-sem-necessidade"></div>
                            </div>
                            <div class="kanban-column" id="coluna-vl">
                                <div class="kanban-column-header"><span class="header-text" style="color:var(--color-warning)"><i class="fas fa-car"></i> Via Livre</span><span class="card-count" id="count-vl">0</span></div>
                                <div class="kanban-cards-container" data-coluna-id="coluna-vl"></div>
                            </div>
                            <div class="kanban-column" id="coluna-amc">
                                <div class="kanban-column-header"><span class="header-text" style="color:var(--color-success)"><i class="fas fa-shield-alt"></i> AMC</span><span class="card-count" id="count-amc">0</span></div>
                                <div class="kanban-cards-container" data-coluna-id="coluna-amc"></div>
                            </div>
                        </div>
                    </div>
                    <div id="gaveta-arquivados">
                        <div class="kanban-column-header"><span class="header-text">Normalizados</span><span class="card-count" id="count-normalizados-gaveta">0</span></div>
                        <div class="kanban-cards-container" id="coluna-normalizados" data-coluna-id="coluna-normalizados"></div>
                    </div>
                    <button id="btn-abrir-gaveta" class="btn-icon" style="position:absolute;top:10px;right:10px;background:var(--color-primary);color:#fff"><i class="fas fa-archive"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAIS -->
<div id="modal-relatorio" class="modal-overlay"><div class="modal-container"><div class="modal-header">Relatório</div><div class="modal-body"><textarea id="modal-relatorio-texto" class="mono-font" readonly style="width:100%;border:none;background:var(--color-bg);color:var(--color-text-primary);height:60vh"></textarea></div><div class="modal-footer"><button id="btn-modal-copiar" class="btn btn-primario">Copiar</button><button id="btn-modal-fechar" class="btn btn-secundario">Fechar</button></div></div></div>
<div id="modal-despacho-semaforo" class="modal-overlay"><div class="modal-container"><div class="modal-header">Despachar</div><div class="modal-body"><input type="hidden" id="despacho-card-id"><div class="form-group"><label>Equipe:</label><input type="text" id="despacho-equipe" placeholder="Nome do responsável"></div><div class="form-group"><label>VT:</label><input type="text" id="despacho-vt" placeholder="Número da viatura"></div><button id="btn-despacho-confirmar" class="btn btn-primario">Confirmar</button></div></div></div>
<div id="modal-edicao" class="modal-overlay"><div class="modal-container"><div class="modal-header">Editar</div><div class="modal-body"><input type="hidden" id="edit-card-id"><div class="form-group"><label>Endereço:</label><input type="text" id="edit-endereco"></div><div class="form-group"><label>Problema:</label><select id="edit-problema"><option value="APAGADO">APAGADO</option><option value="PISCANTE">PISCANTE</option><option value="TRAVADO">TRAVADO</option></select></div><button id="btn-edicao-salvar" class="btn btn-primario">Salvar</button></div></div></div>
<div id="modal-historico" class="modal-overlay"><div class="modal-container"><div class="modal-header">Histórico</div><div class="modal-body" id="historico-body"></div><div class="modal-footer"><button id="btn-historico-fechar" class="btn btn-secundario">Fechar</button></div></div></div>
<div id="modal-confirmar" class="modal-overlay"><div class="modal-container"><div class="modal-header">Confirmar</div><div class="modal-body"><p id="confirm-msg"></p></div><div class="modal-footer"><button id="confirm-ok" class="btn btn-primario">OK</button><button id="confirm-cancel" class="btn btn-secundario">Cancelar</button></div></div></div>
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// UTILIDADES GLOBAIS
// ═══════════════════════════════════════════════════════════════════════
let confirmCallback = null;
function confirmarModal(msg, onOk) {
    document.getElementById('confirm-msg').textContent = msg;
    confirmCallback = onOk;
    document.getElementById('modal-confirmar').classList.add('visible');
}
document.getElementById('confirm-ok').addEventListener('click', () => {
    document.getElementById('modal-confirmar').classList.remove('visible');
    if (confirmCallback) confirmCallback();
    confirmCallback = null;
});
document.getElementById('confirm-cancel').addEventListener('click', () => {
    document.getElementById('modal-confirmar').classList.remove('visible');
    confirmCallback = null;
});

function showToast(msg, type = 'success', dur = 3000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, dur);
}

function registrarAcao(msg) {
    const logs = JSON.parse(localStorage.getItem('nit-historico') || '[]');
    logs.unshift({ timestamp: new Date().toLocaleString('pt-BR'), msg });
    if (logs.length > 200) logs.pop();
    localStorage.setItem('nit-historico', JSON.stringify(logs));
}

// ═══════════════════════════════════════════════════════════════════════
// FIREBASE (carregado com defer)
// ═══════════════════════════════════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyCWAGfmCr-pHr0asIk_Sfz1WbajIEhiZn0",
    authDomain: "nit-operacional.firebaseapp.com",
    databaseURL: "https://nit-operacional-default-rtdb.firebaseio.com/",
    projectId: "nit-operacional"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const fbKanban = db.ref('kanban');

// ═══════════════════════════════════════════════════════════════════════
// VARIÁVEIS GLOBAIS
// ═══════════════════════════════════════════════════════════════════════
let operadorAtual = '';
let turnoAtual = '';
let dataAtiva = null;
let cardsCache = {};

// ═══════════════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════════════
function initLogin() {
    const nomeInput = document.getElementById('login-nome');
    const turnoSel = document.getElementById('login-turno');
    const btn = document.getElementById('btn-login-entrar');
    const validar = () => btn.disabled = !(nomeInput.value.trim().length >= 2 && turnoSel.value);
    nomeInput.addEventListener('input', validar);
    turnoSel.addEventListener('change', validar);
    btn.addEventListener('click', () => {
        operadorAtual = nomeInput.value.trim();
        turnoAtual = turnoSel.value;
        sessionStorage.setItem('nit-operador', operadorAtual);
        sessionStorage.setItem('nit-turno', turnoAtual);
        document.getElementById('nit-login-bar').classList.add('hidden');
        document.getElementById('nit-operador-badge').textContent = `👤 ${operadorAtual} · ${turnoAtual}`;
        document.getElementById('nit-operador-badge').style.display = '';
        showToast(`Bem-vindo, ${operadorAtual}!`, 'success');
        registrarAcao(`Login: ${operadorAtual} — ${turnoAtual}`);
    });
    const savedNome = sessionStorage.getItem('nit-operador');
    const savedTurno = sessionStorage.getItem('nit-turno');
    if (savedNome && savedTurno) {
        nomeInput.value = savedNome;
        turnoSel.value = savedTurno;
        btn.disabled = false;
        btn.click();
    }
}

// ═══════════════════════════════════════════════════════════════════════
// LISTENER FIREBASE OTIMIZADO (child_* em vez de value)
// ═══════════════════════════════════════════════════════════════════════
function addCardToDOM(cardId, cardData) {
    if (!dataAtiva || cardData.dataReferencia !== dataAtiva) return;
    const container = document.querySelector(`[data-coluna-id="${cardData.coluna}"]`);
    if (!container) return;
    const existing = document.getElementById(cardId);
    if (existing) existing.remove();
    const card = criarCardElement(cardId, cardData);
    container.appendChild(card);
    atualizarContadores();
}

function updateCardInDOM(cardId, cardData) {
    const existing = document.getElementById(cardId);
    if (!existing) { addCardToDOM(cardId, cardData); return; }
    if (cardData.coluna !== existing.closest('.kanban-cards-container')?.dataset.colunaId) {
        existing.remove();
        addCardToDOM(cardId, cardData);
    } else {
        Object.keys(cardData).forEach(k => existing.dataset[k] = cardData[k]);
        const header = existing.querySelector('.card-header strong');
        if (header) header.textContent = cardData.codigo;
        const body = existing.querySelector('.card-body div');
        if (body) body.innerHTML = cardData.endereco;
        const tag = existing.querySelector('.card-status-tag');
        if (tag) tag.textContent = cardData.problema;
    }
    atualizarContadores();
}

function removeCardFromDOM(cardId) {
    document.getElementById(cardId)?.remove();
    atualizarContadores();
}

fbKanban.on('child_added', snap => addCardToDOM(snap.key, snap.val()));
fbKanban.on('child_changed', snap => updateCardInDOM(snap.key, snap.val()));
fbKanban.on('child_removed', snap => removeCardFromDOM(snap.key));

// Carrega cards existentes
fbKanban.once('value', snap => {
    const data = snap.val() || {};
    Object.keys(data).forEach(key => addCardToDOM(key, data[key]));
});

// ═══════════════════════════════════════════════════════════════════════
// RENDERIZAÇÃO DE CARD
// ═══════════════════════════════════════════════════════════════════════
function criarCardElement(cardId, data) {
    const div = document.createElement('div');
    div.className = 'kanban-card';
    div.id = cardId;
    div.draggable = true;
    div.dataset.codigo = data.codigo;
    div.dataset.eventoid = cardId;
    div.dataset.coluna = data.coluna;
    div.dataset.datareferencia = data.dataReferencia;
    div.innerHTML = `
        <div class="card-header">
            <strong>${data.codigo}</strong>
            <span class="card-status-tag">${data.problema || 'N/I'}</span>
            ${data.reincidente ? '<span class="reincident-tag">↺ REINC</span>' : ''}
        </div>
        <div class="card-body">
            <div>${data.endereco || ''}</div>
            ${data.observacoes ? `<div style="margin-top:4px;font-size:11px;color:var(--color-text-tertiary)">${data.observacoes.substring(0, 100)}</div>` : ''}
        </div>
        <div class="card-footer">
            <button class="btn-card-action copy-location"><i class="fas fa-copy"></i></button>
            <button class="btn-card-action dispatch"><i class="fas fa-paper-plane"></i></button>
            <button class="btn-card-action edit"><i class="fas fa-edit"></i></button>
            <button class="btn-card-action complete"><i class="fas fa-check"></i></button>
        </div>
    `;
    div.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', cardId));
    return div;
}

// ═══════════════════════════════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════════════════════════════
document.querySelectorAll('.kanban-cards-container').forEach(container => {
    container.addEventListener('dragover', e => e.preventDefault());
    container.addEventListener('drop', e => {
        e.preventDefault();
        const cardId = e.dataTransfer.getData('text/plain');
        const card = document.getElementById(cardId);
        if (!card) return;
        const destino = e.target.closest('.kanban-cards-container');
        if (!destino || card.parentElement === destino) return;
        const novaColuna = destino.dataset.colunaId;
        destino.appendChild(card);
        fbKanban.child(cardId).update({ coluna: novaColuna, ts: Date.now() });
        registrarAcao(`Card ${cardId} movido para ${novaColuna}`);
    });
});

// ═══════════════════════════════════════════════════════════════════════
// PROCESSAMENTO VIA BACKEND
// ═══════════════════════════════════════════════════════════════════════
async function processarViaAPI(texto) {
    const response = await fetch('https://nit-backend-production.up.railway.app/api/v1/processar-relatorio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-NIT-Key': 'NIT_INTEGRADO_20052026_da822f90-45aa-42ca-ba07-3443d0ffd730' },
        body: JSON.stringify({ texto })
    });
    if (!response.ok) throw new Error(`API error: ${response.status}`);
    return response.json();
}

document.getElementById('btn-processar').addEventListener('click', async () => {
    const texto = document.getElementById('relatorio-bruto-input').value;
    if (!texto.trim()) return showToast('Insira o relatório.', 'warning');
    document.getElementById('btn-processar').disabled = true;
    try {
        const result = await processarViaAPI(texto);
        const batch = {};
        result.eventos.forEach(ev => {
            batch[ev.eventoId] = {
                codigo: ev.codigo, endereco: ev.endereco, problema: ev.problema,
                tipo: ev.tipo, inicio: ev.inicio, fim: ev.fim, observacoes: ev.observacoes,
                status: ev.status, coluna: ev.coluna, dataReferencia: ev.dataReferencia,
                reincidente: ev.reincidente, operador: operadorAtual, turno: turnoAtual, ts: Date.now()
            };
        });
        await fbKanban.update(batch);
        if (!dataAtiva) dataAtiva = result.dataReferencia;
        document.getElementById('relatorio-bruto-input').value = '';
        showToast(`${result.total} ocorrências processadas.`, 'success');
        registrarAcao(`Processado lote de ${result.total} ocorrências`);
    } catch (err) {
        showToast('Erro: ' + err.message, 'error');
    } finally {
        document.getElementById('btn-processar').disabled = false;
    }
});

// ═══════════════════════════════════════════════════════════════════════
// CONTADORES
// ═══════════════════════════════════════════════════════════════════════
function atualizarContadores() {
    const cont = {
        espera: document.querySelectorAll('[data-coluna-id="coluna-espera"] .kanban-card').length,
        semNec: document.querySelectorAll('[data-coluna-id="coluna-sem-necessidade"] .kanban-card').length,
        vl: document.querySelectorAll('[data-coluna-id="coluna-vl"] .kanban-card').length,
        amc: document.querySelectorAll('[data-coluna-id="coluna-amc"] .kanban-card').length,
        normalizados: document.querySelectorAll('[data-coluna-id="coluna-normalizados"] .kanban-card').length
    };
    document.getElementById('count-espera').textContent = cont.espera;
    document.getElementById('count-sem-necessidade').textContent = cont.semNec;
    document.getElementById('count-vl').textContent = cont.vl;
    document.getElementById('count-amc').textContent = cont.amc;
    document.getElementById('count-normalizados-gaveta').textContent = cont.normalizados;
    const total = cont.espera + cont.semNec + cont.vl + cont.amc + cont.normalizados;
    document.getElementById('display-total').textContent = total;
    document.getElementById('display-normalizados').textContent = cont.normalizados;
    document.getElementById('display-pendentes').textContent = total - cont.normalizados;
}

// ═══════════════════════════════════════════════════════════════════════
// RELATÓRIO (frontend simples)
// ═══════════════════════════════════════════════════════════════════════
function gerarPreview() {
    const cards = document.querySelectorAll('.kanban-card');
    const total = cards.length;
    const normalizados = document.querySelectorAll('[data-coluna-id="coluna-normalizados"] .kanban-card').length;
    let txt = `STATUS SEMAFÓRICO\n${new Date().toLocaleString()}\n\n`;
    txt += `Total: ${total} | Pendentes: ${total - normalizados} | Normalizados: ${normalizados}\n\n`;
    document.getElementById('relatorio-final-preview').value = txt;
    return txt;
}
document.getElementById('btn-visualizar-relatorio').addEventListener('click', () => {
    document.getElementById('modal-relatorio-texto').value = gerarPreview();
    document.getElementById('modal-relatorio').classList.add('visible');
});
document.getElementById('btn-modal-copiar').addEventListener('click', () => {
    const text = document.getElementById('modal-relatorio-texto').value;
    navigator.clipboard.writeText(text);
    showToast('Relatório copiado!');
    document.getElementById('modal-relatorio').classList.remove('visible');
});
document.getElementById('btn-modal-fechar').addEventListener('click', () => {
    document.getElementById('modal-relatorio').classList.remove('visible');
});

// ═══════════════════════════════════════════════════════════════════════
// HISTÓRICO
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('btn-ver-historico').addEventListener('click', () => {
    const logs = JSON.parse(localStorage.getItem('nit-historico') || '[]');
    const body = document.getElementById('historico-body');
    body.innerHTML = logs.map(l => `<div style="padding:8px;border-bottom:1px solid var(--color-border);font-size:12px"><span style="color:var(--color-text-tertiary)">${l.timestamp}</span> ${l.msg}</div>`).join('');
    document.getElementById('modal-historico').classList.add('visible');
});
document.getElementById('btn-historico-fechar').addEventListener('click', () => {
    document.getElementById('modal-historico').classList.remove('visible');
});

// ═══════════════════════════════════════════════════════════════════════
// LIMPAR PAINEL
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('btn-limpar-painel').addEventListener('click', () => {
    confirmarModal('Remover TODOS os cards? Esta ação é irreversível.', () => {
        fbKanban.remove().then(() => {
            showToast('Painel limpo!');
            registrarAcao('Painel limpo pelo operador');
        });
    });
});

// ═══════════════════════════════════════════════════════════════════════
// EVENTOS DOS CARDS (delegação)
// ═══════════════════════════════════════════════════════════════════════
document.body.addEventListener('click', (e) => {
    const btn = e.target.closest('.btn-card-action');
    if (!btn) return;
    const card = btn.closest('.kanban-card');
    if (!card) return;
    const cardId = card.id;
    if (btn.classList.contains('copy-location')) {
        navigator.clipboard.writeText(card.dataset.codigo);
        showToast('Código copiado!');
    } else if (btn.classList.contains('dispatch')) {
        document.getElementById('despacho-card-id').value = cardId;
        document.getElementById('modal-despacho-semaforo').classList.add('visible');
    } else if (btn.classList.contains('edit')) {
        document.getElementById('edit-card-id').value = cardId;
        document.getElementById('edit-endereco').value = card.querySelector('.card-body div')?.textContent || '';
        document.getElementById('edit-problema').value = card.querySelector('.card-status-tag')?.textContent || 'APAGADO';
        document.getElementById('modal-edicao').classList.add('visible');
    } else if (btn.classList.contains('complete')) {
        confirmarModal('Normalizar ocorrência?', () => {
            fbKanban.child(cardId).update({ coluna: 'coluna-normalizados', status: 'normalizados' });
            showToast('Normalizado!');
        });
    }
});

document.getElementById('btn-despacho-confirmar').addEventListener('click', () => {
    const cardId = document.getElementById('despacho-card-id').value;
    const equipe = document.getElementById('despacho-equipe').value;
    const vt = document.getElementById('despacho-vt').value;
    fbKanban.child(cardId).update({ equipe, vt });
    document.getElementById('modal-despacho-semaforo').classList.remove('visible');
    showToast('Despacho registrado!');
});
document.getElementById('btn-edicao-salvar').addEventListener('click', () => {
    const cardId = document.getElementById('edit-card-id').value;
    const endereco = document.getElementById('edit-endereco').value;
    const problema = document.getElementById('edit-problema').value;
    fbKanban.child(cardId).update({ endereco, problema });
    document.getElementById('modal-edicao').classList.remove('visible');
    showToast('Card atualizado!');
});

// ═══════════════════════════════════════════════════════════════════════
// GAVETA
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('btn-abrir-gaveta').addEventListener('click', () => {
    document.getElementById('gaveta-arquivados').classList.add('open');
    document.getElementById('kanban-wrapper').classList.add('gaveta-open');
});
document.querySelector('#gaveta-arquivados .kanban-column-header')?.addEventListener('dblclick', () => {
    document.getElementById('gaveta-arquivados').classList.remove('open');
    document.getElementById('kanban-wrapper').classList.remove('gaveta-open');
});

// ═══════════════════════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
    initLogin();
    atualizarContadores();
    // Carrega metadados
    db.ref('meta/dataReferencia').once('value', snap => {
        if (snap.val()) dataAtiva = snap.val();
    });
});
</script>
