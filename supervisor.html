<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT · Supervisor</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root {
            /* Superfícies com contraste reforçado (+10% dark) */
            --s0: #05070a; /* Fundo mais profundo */
            --s1: #0d121a;
            --s2: #141b26;
            --s3: #1c2533;
            
            /* Texto com contraste reforçado (Mais claro/branco) */
            --tx1: #ffffff; /* Contraste máximo para títulos */
            --tx2: #b0c4de; /* Texto secundário clareado */
            --tx3: #8ba4bc;
            
            /* Identidade Visual e Semântica */
            --blu: #4A9EFF;
            --org: #F5883A;
            --color-success: #3fb950;
            --color-danger: #ff3333; /* Vermelho puro para "Aguardando" */
            
            /* Layout */
            --bar-h: 60px;
            --radius-md: 12px;
            --space-2: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--s0);
            color: var(--tx1);
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            overscroll-behavior: none;
        }

        #app {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            height: var(--bar-h);
            background: var(--s1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 0 var(--space-2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tb-live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--color-danger); /* Inicia vermelho até conectar */
            margin-right: 8px;
            transition: background 0.3s;
        }

        .tb-title { font-weight: 800; font-size: 16px; letter-spacing: -0.3px; }

        /* Lista de Cards */
        #list-wrap { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

        .card {
            background: var(--s2);
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-cod { font-weight: 900; font-size: 18px; color: var(--blu); }
        
        /* Badge de Status - FOCO NO VERMELHO */
        .badge {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .status-aguardando { background: rgba(255, 51, 51, 0.15); color: var(--color-danger); border: 1px solid var(--color-danger); }
        .status-atendimento { background: rgba(74, 158, 255, 0.15); color: var(--blu); border: 1px solid var(--blu); }
        .status-normalizado { background: rgba(63, 185, 80, 0.15); color: var(--color-success); border: 1px solid var(--color-success); }

        .card-loc { font-weight: 600; font-size: 14px; color: var(--tx1); }
        .card-prob { font-size: 13px; color: var(--tx2); }
    </style>
</head>
<body>

<div id="app">
    <header class="topbar">
        <div class="tb-live-dot" id="sync-dot"></div>
        <div class="tb-title" id="status-text">NIT · Conectando...</div>
    </header>

    <main id="list-wrap">
        </main>
</div>

<script>
    // 1. Configuração Firebase com a Barra Final
    const firebaseConfig = {
        apiKey: "AIzaSyCWAGfmCr-pHr0asIk_Sfz1WbajIEhiZn0",
        authDomain: "nit-operacional.firebaseapp.com",
        databaseURL: "https://nit-operacional-default-rtdb.firebaseio.com/",
        projectId: "nit-operacional",
        storageBucket: "nit-operacional.firebasestorage.app",
        messagingSenderId: "823046484118",
        appId: "1:823046484118:web:487159cabb28ae275bd2b7"
    };

    // 2. Inicialização Segura
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 3. Renderização dos Cards
    function renderCards(dados) {
        const container = document.getElementById('list-wrap');
        container.innerHTML = '';

        // Converter objeto do Firebase em Array e ordenar por tempo (mais recentes primeiro)
        const lista = Object.keys(dados).map(key => ({ id: key, ...dados[key] }));
        
        lista.reverse().forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Lógica de Status para cor vermelha em "Aguardando"
            let statusClass = 'status-aguardando';
            let statusLabel = 'Aguardando';

            if (item.pl === 'atend') {
                statusClass = 'status-atendimento';
                statusLabel = 'Em Atendimento';
            } else if (item.pl === 'norm') {
                statusClass = 'status-normalizado';
                statusLabel = 'Normalizado';
            }

            card.innerHTML = `
                <div class="card-header">
                    <span class="card-cod">${item.cod || 'S/N'}</span>
                    <span class="badge ${statusClass}">${statusLabel}</span>
                </div>
                <div class="card-loc">${item.loc || 'Localização não informada'}</div>
                <div class="card-prob">${item.prob || 'Problema não especificado'}</div>
            `;
            container.appendChild(card);
        });
    }

    // 4. Escuta em Tempo Real (Ouvinte Principal)
    function iniciarMonitoramento() {
        const dot = document.getElementById('sync-dot');
        const txt = document.getElementById('status-text');

        db.ref('ocorrencias').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                renderCards(data);
                dot.style.background = "#3fb950"; // Verde se houver dados
                txt.innerText = "NIT · Supervisor Online";
            } else {
                document.getElementById('list-wrap').innerHTML = '<p style="text-align:center; color:var(--tx3); margin-top:40px;">Nenhuma ocorrência ativa.</p>';
                dot.style.background = var(--blu);
                txt.innerText = "NIT · Banco Vazio";
            }
        }, (error) => {
            console.error(error);
            txt.innerText = "NIT · Erro de Conexão";
            dot.style.background = "#ff3333";
        });
    }

    document.addEventListener('DOMContentLoaded', iniciarMonitoramento);
</script>

</body>
</html>
